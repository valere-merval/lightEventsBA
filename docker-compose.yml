
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lightevents
      POSTGRES_USER: lightevents
      POSTGRES_PASSWORD: lightevents
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  api:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/lightevents
      DATABASE_USERNAME: lightevents
      DATABASE_PASSWORD: lightevents
      DATABASE_DRIVER: org.postgresql.Driver
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports: ["8080:8080"]
    depends_on: [postgres]
volumes:
  postgres_data:
