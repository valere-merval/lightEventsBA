spring.application.name=LightEvents Backend
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:lightevents;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_MS:20000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${DATABASE_SCHEMA:public}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
management.endpoints.web.exposure.include=health,info,metrics

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.mail.from=${MAIL_FROM:no-reply@lightevents.local}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
stripe.secret-key=${STRIPE_SECRET_KEY:}
paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}
twilio.sms-from=${TWILIO_SMS_FROM:}

s3.bucket=${S3_BUCKET:}
s3.region=${S3_REGION:eu-central-1}
s3.endpoint=${S3_ENDPOINT:}
s3.public-base-url=${S3_PUBLIC_BASE_URL:}
s3.access-key=${S3_ACCESS_KEY:}
s3.secret-key=${S3_SECRET_KEY:}
openai.image-model=${OPENAI_IMAGE_MODEL:gpt-image-1.5}
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:120MB}

# GetMiPay Mobile Money gateway
# API docs: https://docs.getmipay.com/api-doc
getmipay.base-url=${GETMIPAY_BASE_URL:https://sandbox.getmipay.com/api}
getmipay.public-api-key=${GETMIPAY_PUBLIC_API_KEY:}
getmipay.private-secret-key=${GETMIPAY_PRIVATE_SECRET_KEY:}
getmipay.callback-url=${GETMIPAY_CALLBACK_URL:}
# Service IDs are merchant/account dependent. Use GET /api/payments/mobile-money/services after configuring keys.
getmipay.services.orange-money=${GETMIPAY_SERVICE_ORANGE_MONEY:3}
getmipay.services.mtn-money=${GETMIPAY_SERVICE_MTN_MONEY:1}
getmipay.services.wave=${GETMIPAY_SERVICE_WAVE:}
getmipay.services.airtel-money=${GETMIPAY_SERVICE_AIRTEL_MONEY:}
getmipay.services.moov-money=${GETMIPAY_SERVICE_MOOV_MONEY:}
